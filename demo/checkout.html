<!DOCTYPE html>

<html class="light" lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>New Order - Mobile UI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1A1C1E",
                        "background-light": "#f7f7f7",
                        "background-dark": "#18191a",
                        "surface-container-high": "#e9e8e9",
                        "on-surface": "#313234",
                        "on-surface-variant": "#5e5f61",
                        "outline-variant": "#b2b2b4",
                        "surface-container-low": "#f5f3f4",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#7a7b7c",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .headline-sm {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 2rem;
        }

        .label-md {
            font-size: 0.75rem;
            font-weight: 600;
            line-height: 1rem;
        }

        .title-sm {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.5rem;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-surface min-h-screen pb-40">
    <!-- TopAppBar Component -->
    <header class="w-full sticky top-0 z-50 bg-[#fbf9f9] dark:bg-slate-950">
        <div class="flex items-center justify-between px-6 py-4 w-full">
            <div class="flex items-center gap-4">
                <button
                    class="text-[#595f65] dark:text-slate-300 active:scale-95 duration-200 transition-colors hover:bg-slate-200/50 dark:hover:bg-slate-800/50 p-2 rounded-full">
                    <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
                </button>
                <h1 class="font-plus-jakarta-sans headline-sm text-[#313234] dark:text-slate-100">Tạo hóa đơn</h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="bg-surface-container-high px-3 py-1 rounded-full text-on-surface-variant label-md">Bàn số
                    2</span>
            </div>
        </div>
    </header>
    <main class="px-6 pt-4 max-w-2xl mx-auto space-y-8">
        <!-- Order Header / Controls -->
        <section class="relative group">
            <select class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" id="order-type-select">
                <option selected="" value="dine-in">Ăn tại chỗ</option>
                <option value="takeout">Mang về</option>
            </select>
            <div
                class="flex items-center justify-between bg-white border border-outline-variant/30 p-4 rounded-lg shadow-sm group-focus-within:ring-2 group-focus-within:ring-primary/20 transition-all">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-[#1A1C1E]" data-icon="restaurant">restaurant</span>
                    <span class="font-semibold text-on-surface">Ăn tại chỗ</span>
                </div>
                <span class="material-symbols-outlined text-outline" data-icon="expand_more">expand_more</span>
            </div>
        </section>
        <!-- Food Items List -->
        <div class="space-y-6">
            <!-- Item 1 -->
            <div class="bg-surface-container-lowest p-5 rounded-lg flex flex-col gap-4">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <h3 class="title-sm text-on-surface">Bún bò Huế Đặc biệt</h3>
                        <p class="label-md text-on-surface-variant opacity-70">Đơn giá: 65,000đ</p>
                    </div>
                    <span class="font-bold text-on-surface text-lg">130,000đ</span>
                </div>
                <div class="flex items-center justify-end gap-4 mt-2">
                    <div
                        class="flex items-center bg-surface-container-high/50 rounded-full p-1 border border-outline-variant/10 shadow-sm">
                        <button
                            class="w-9 h-9 flex items-center justify-center rounded-full bg-white text-on-surface border border-outline-variant/20 active:scale-90 transition-all hover:bg-white/80">
                            <span class="material-symbols-outlined text-[18px]" data-icon="remove">remove</span>
                        </button>
                        <span class="px-5 font-bold text-on-surface text-sm">2</span>
                        <button
                            class="w-9 h-9 flex items-center justify-center rounded-full bg-primary text-white shadow-md active:scale-90 transition-all hover:brightness-110">
                            <span class="material-symbols-outlined text-[18px] font-bold" data-icon="add">add</span>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Item 2 -->
            <div class="bg-surface-container-lowest p-5 rounded-lg flex flex-col gap-4">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <h3 class="title-sm text-on-surface">Trà đào cam sả</h3>
                        <p class="label-md text-on-surface-variant opacity-70">Đơn giá: 35,000đ</p>
                    </div>
                    <span class="font-bold text-on-surface text-lg">35,000đ</span>
                </div>
                <div class="flex items-center justify-end gap-4 mt-2">
                    <div
                        class="flex items-center bg-surface-container-high/50 rounded-full p-1 border border-outline-variant/10 shadow-sm">
                        <button
                            class="w-9 h-9 flex items-center justify-center rounded-full bg-white text-on-surface border border-outline-variant/20 active:scale-90 transition-all hover:bg-white/80">
                            <span class="material-symbols-outlined text-[18px]" data-icon="remove">remove</span>
                        </button>
                        <span class="px-5 font-bold text-on-surface text-sm">1</span>
                        <button
                            class="w-9 h-9 flex items-center justify-center rounded-full bg-primary text-white shadow-md active:scale-90 transition-all hover:brightness-110">
                            <span class="material-symbols-outlined text-[18px] font-bold" data-icon="add">add</span>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Item 3 -->
            <div class="bg-surface-container-lowest p-5 rounded-lg flex flex-col gap-4">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <h3 class="title-sm text-on-surface">Nem lụi (vỉ 5 cái)</h3>
                        <p class="label-md text-on-surface-variant opacity-70">Đơn giá: 85,000đ</p>
                    </div>
                    <span class="font-bold text-on-surface text-lg">85,000đ</span>
                </div>
                <div class="flex items-center justify-end gap-4 mt-2">
                    <div
                        class="flex items-center bg-surface-container-high/50 rounded-full p-1 border border-outline-variant/10 shadow-sm">
                        <button
                            class="w-9 h-9 flex items-center justify-center rounded-full bg-white text-on-surface border border-outline-variant/20 active:scale-90 transition-all hover:bg-white/80">
                            <span class="material-symbols-outlined text-[18px]" data-icon="remove">remove</span>
                        </button>
                        <span class="px-5 font-bold text-on-surface text-sm">1</span>
                        <button
                            class="w-9 h-9 flex items-center justify-center rounded-full bg-primary text-white shadow-md active:scale-90 transition-all hover:brightness-110">
                            <span class="material-symbols-outlined text-[18px] font-bold" data-icon="add">add</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- Bottom Navigation Shell -->
    <footer
        class="fixed bottom-0 left-0 w-full p-6 bg-white/85 dark:bg-slate-900/85 backdrop-blur-lg z-50 rounded-t-2xl shadow-[0_-4px_40px_rgba(49,50,52,0.06)]">
        <!-- Order Summary Row -->
        <div class="flex justify-between items-end mb-6">
            <div class="flex flex-col">
                <span class="label-md text-on-surface-variant uppercase tracking-wider mb-1">Số lượng: 4 món</span>
                <span class="text-2xl font-extrabold text-on-surface">255,000đ</span>
            </div>
            <div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center">
                <span class="material-symbols-outlined text-primary" data-icon="receipt_long">receipt_long</span>
            </div>
        </div>
        <!-- Action Buttons Cluster -->
        <div class="flex items-center justify-between gap-4">
            <!-- Add Items Button (Inactive State Style) -->
            <button
                class="flex-1 flex flex-row items-center justify-center text-[#313234] dark:text-slate-300 border border-[#b2b2b4]/20 rounded-xl px-4 py-4 gap-2 active:scale-98 duration-150 hover:opacity-90">
                <span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
                <span class="font-plus-jakarta-sans label-md tracking-wider uppercase">Thêm món</span>
            </button>
            <!-- Send to Kitchen Button (Active State Style) -->
            <button
                class="flex-[1.5] flex flex-row items-center justify-center bg-gradient-to-br from-[#595f65] to-[#4d5359] text-white rounded-xl px-4 py-4 gap-2 active:scale-98 duration-150 shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined" data-icon="send"
                    style="font-variation-settings: 'FILL' 1;">send</span>
                <span class="font-plus-jakarta-sans label-md tracking-wider uppercase">Gửi bếp ngay</span>
            </button>
        </div>
    </footer>
</body>

</html>
